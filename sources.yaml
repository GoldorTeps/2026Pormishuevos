  # Globo Brasil — emite 55 partidos + todos los de Brasil. HTTP 200 verificado 14/06.
  Brasil:     https://59d39900ebfb8.streamlock.net/globo-720p/globo-720p/playlist.m3u8

  # TRT 1 HD — Turquía. Sin geo-bloqueo. Verificado 14/06.
